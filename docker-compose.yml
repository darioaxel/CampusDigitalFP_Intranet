# =============================================================================
# Docker Compose - Campus Digital FP Intranet
# =============================================================================
# Usa PostgreSQL compartido (shared-postgres) en lugar de instancia propia

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Aplicación Nuxt (Intranet)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intranet-app
    restart: unless-stopped
    environment:
      # Base de datos: usar shared-postgres (postgres compartido)
      DATABASE_URL: postgresql://${POSTGRES_USER:-intranet_app}:${POSTGRES_PASSWORD}@shared-postgres:5432/${POSTGRES_DB:-campus_intranet}?schema=public
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-intranet_app}:${POSTGRES_PASSWORD}@shared-postgres:5432/${POSTGRES_DB:-campus_intranet}?schema=public
      
      # Seguridad
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
      
      # OAuth (opcional)
      NUXT_OAUTH_GOOGLE_CLIENT_ID: ${NUXT_OAUTH_GOOGLE_CLIENT_ID:-}
      NUXT_OAUTH_GOOGLE_CLIENT_SECRET: ${NUXT_OAUTH_GOOGLE_CLIENT_SECRET:-}
      
      # Entorno
      NODE_ENV: production
      NITRO_PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"  # Solo accesible vía localhost (Caddy proxy)
    networks:
      - intranet-network
      - postgres-network  # Red externa al shared-postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  intranet-network:
    driver: bridge
  postgres-network:
    external: true  # Red externa donde está shared-postgres
