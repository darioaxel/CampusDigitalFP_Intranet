
name: Deploy Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy-hetzner:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /apps/app3
            git pull origin main
             
