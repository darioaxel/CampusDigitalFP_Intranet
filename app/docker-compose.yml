version: "3.8"

services:
  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app3
    restart: unless-stopped
    # Cuando migres a Nuxt, descomenta lo siguiente:
    # environment:
    #   - NODE_ENV=production
    #   - PORT=80
    #   - HOST=0.0.0.0
